name: Build & Push Staging Docker Image

on:
  schedule:
    # Daily staging rebuild from the `staging` branch. Runs once per day so we
    # don't burn through the GitHub Actions free tier on every commit but still
    # get a current `:staging` image for Docker-based environments.
    - cron: "0 5 * * *"  # Daily 05:00 UTC
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: staging

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute refresh keys
        id: refresh
        run: |
          echo "ca=$(date -u +%G-W%V)" >> "$GITHUB_OUTPUT"
          echo "frontend=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"
          echo "sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/prolix-oc/lumiverse:staging
            ghcr.io/prolix-oc/lumiverse:staging-${{ steps.refresh.outputs.sha }}
          labels: |
            org.opencontainers.image.title=Lumiverse (staging)
            org.opencontainers.image.description=AI chat application server — staging branch build
            org.opencontainers.image.source=https://github.com/prolix-oc/Lumiverse
            org.opencontainers.image.revision=${{ github.sha }}
          build-args: |
            CA_REFRESH=${{ steps.refresh.outputs.ca }}
            FRONTEND_REFRESH=${{ steps.refresh.outputs.frontend }}
          cache-from: type=gha,scope=staging
          cache-to: type=gha,mode=max,scope=staging
