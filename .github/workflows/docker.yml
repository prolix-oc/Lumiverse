name: Build & Push Docker Image

on:
  push:
    tags: ["v*"]
  schedule:
    # Weekly rebuild to refresh the CA certificate bundle baked into `:latest`.
    # Combined with the CA_REFRESH build-arg below, this forces apt to pull the
    # current `ca-certificates` package so TLS trust stays in sync with Mozilla
    # root updates without waiting for a Lumiverse release.
    - cron: "0 6 * * 1"  # Mondays 06:00 UTC
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/prolix-oc/lumiverse
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=latest,enable=${{ github.event_name == 'schedule' }}

      - name: Compute CA refresh key (ISO week)
        id: ca
        run: echo "refresh=$(date -u +%G-W%V)" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            CA_REFRESH=${{ steps.ca.outputs.refresh }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
